syntax = "proto3";

package book;

service BookService {
  rpc GetBookById(GetBookByIdRequest) returns (GetBookByIdResponse);
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc WatchBooks(WatchBooksRequest) returns (stream Book);
}

message GetBookByIdRequest {
  string id = 1;
  }

message GetBookByIdResponse {
  string id = 1;
  string title = 2;
  string author_id = 3;
  string publisher_id = 4;
  int32 publishing_year = 5;
}

message CreateBookRequest {
  string title = 1;
  string author_id = 2;
  string publisher_id = 3;
  int32 publishing_year = 4;
}

message CreateBookResponse {
  string id = 1;
  string title = 2;
  string author_id = 3;
  string publisher_id = 4;
  int32 publishing_year = 5;
}


message WatchBooksRequest {
}

message Book {
  string id = 1;
  string title = 2;
  string author_id = 3;
  string publisher_id = 4;
  int32 publishing_year = 5;
}
